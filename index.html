<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphone Animation | @CodeZenithAI</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<section class="slider-main">

    <div class="container">

        <div class="logo">
            <a href="#"><img src="./images/logo.svg" alt="logo"></a>
        </div>

        <div class="slider-content-wrap">
            <div class="slider-content">
                <h2 class="heading-style-2">
                    Apple AirPods Max Wireless Over-Ear Headphones
                </h2>

                <p>
                    Active Noise Cancelling, Transparency Mode, Spatial Audio,
                    Digital Crown for Volume Control. Bluetooth Headphones for iPhone
                </p>

                <h3 class="heading-style-2">$699.99</h3>

                <div class="social-icons">
                    <a href="#"><img src="./images/instagram.svg" alt="instagram"></a>
                    <a href="#"><img src="./images/facebook.svg" alt="facebook"></a>
                    <a href="#"><img src="./images/twitter.svg" alt="twitter"></a>
                </div>

            </div>
        </div>

    </div>

    <div class="slider-images">
        <img class="slider-image" src="./images/green.png" alt="green headphone">
        <img class="slider-image" src="./images/blue.png" alt="blue headphone">
        <img class="slider-image" src="./images/red.png" alt="red headphone">
        <img class="slider-image" src="./images/white.png" alt="white headphone">
        <img class="slider-image" src="./images/black.png" alt="black headphone">
    </div>

    <div id="backgrounds">
        <div class="background" style="background: radial-gradient(circle, #C7F6D0 0%, #7CB686 92%);"></div>
        <div class="background" style="background: radial-gradient(circle, #D1E4F6 0%, #5F9CCF 100%);"></div>
        <div class="background" style="background: radial-gradient(circle, #FFB7B2 0%, #ED746E 100%);"></div>
        <div class="background" style="background: radial-gradient(circle, #D7D7D7 0%, #979797 100%);"></div>
        <div class="background" style="background: radial-gradient(circle, #6B6B6B 0%, #292929 100%);"></div>
    </div>

</section>

<script src="./script.js"></script>

</body>
</html>
